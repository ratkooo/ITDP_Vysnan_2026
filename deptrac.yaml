deptrac:
  layers:
    - name: Controllers
      collectors:
        - type: directory
          value: src/Controllers/.*

    - name: Repositories
      collectors:
        - type: directory
          value: src/Repositories/.*

    - name: Models
      collectors:
        - type: directory
          value: src/Models/.*

  ruleset:
    Controllers:
      - Repositories
      - Models

    Repositories:
      - Models

    Models: []