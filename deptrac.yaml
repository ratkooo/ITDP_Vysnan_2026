paths:
  - src

layers:
  - name: Controllers
    collectors:
      - type: className
        regex: ^App\\Controllers\\.*

  - name: Repositories
    collectors:
      - type: className
        regex: ^App\\Repositories\\.*

  - name: Models
    collectors:
      - type: className
        regex: ^App\\Models\\.*

rules:
  - Controllers: [Models, Repositories]
  - Repositories: [Models]
  - Models: []

forbid:
  - Models -> Controllers
  - Models -> Repositories
  - Repositories -> Controllers
